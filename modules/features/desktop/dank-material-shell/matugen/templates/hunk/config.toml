mode = "stack"
theme = "custom"

<* if {{ is_dark_mode }} *>
[custom_theme]
label = "dankcolors-dark"

background = "{{colors.surface_container_low.dark.hex}}"
panel = "{{colors.surface_container.dark.hex}}"
panelAlt = "{{colors.surface_container_high.dark.hex}}"
border = "{{colors.outline_variant.dark.hex}}"
text = "{{colors.on_surface.dark.hex}}"
muted = "{{colors.on_surface_variant.dark.hex}}"

accent = "{{colors.primary.dark.hex}}"
accentMuted = "{{colors.primary_container.dark.hex}}"

lineNumberBg = "{{colors.surface_container_low.dark.hex}}"
lineNumberFg = "{{colors.on_surface_variant.dark.hex}}"

addedBg = "{{colors.tertiary_container.dark.hex}}"               
removedBg = "{{colors.error_container.dark.hex}}"                
contextBg = "{{colors.surface_container_low.dark.hex}}"          
selectedHunk = "{{colors.surface_container_highest.dark.hex}}"   

addedContentBg = "{{colors.tertiary_container.dark.hex}}"                  
removedContentBg = "{{colors.error_container.dark.hex}}"                   
contextContentBg = "{{colors.surface_container_low.dark.hex}}"

addedSignColor = "{{colors.on_tertiary_container.dark.hex}}"
removedSignColor = "{{colors.on_error_container.dark.hex}}"
badgeAdded = "{{colors.on_tertiary_container.dark.hex}}"
badgeRemoved = "{{colors.on_error_container.dark.hex}}"
badgeNeutral = "{{colors.on_surface_variant.dark.hex}}"

fileNew = "{{colors.tertiary.dark.hex}}"
fileDeleted = "{{colors.error.dark.hex}}"
fileModified = "{{colors.secondary.dark.hex}}"
fileRenamed = "{{colors.primary.dark.hex}}"
fileUntracked = "{{colors.on_surface_variant.dark.hex}}"

noteBackground = "{{colors.surface_container_high.dark.hex}}"
noteBorder = "{{colors.secondary.dark.hex}}"
noteTitleBackground = "{{colors.secondary_container.dark.hex}}"
noteTitleText = "{{colors.on_secondary_container.dark.hex}}"

[custom_theme.syntax]
default = "{{colors.on_surface.dark.hex}}"
keyword = "{{colors.secondary.dark.hex}}"
string = "{{colors.tertiary.dark.hex}}"
comment = "{{colors.on_surface_variant.dark.hex}}"
number = "{{colors.tertiary_fixed.dark.hex}}"
function = "{{colors.primary.dark.hex}}"
property = "{{colors.on_surface.dark.hex}}"
type = "{{colors.primary_fixed.dark.hex}}"
variable = "{{colors.on_surface.dark.hex}}"
operator = "{{colors.on_surface_variant.dark.hex}}"
punctuation = "{{colors.on_surface_variant.dark.hex}}"

<* else *>
[custom_theme]
label = "dankcolors-light"

background = "{{colors.surface_container_low.light.hex}}"
panel = "{{colors.surface_container.light.hex}}"
panelAlt = "{{colors.surface_container_high.light.hex}}"
border = "{{colors.outline_variant.light.hex}}"
text = "{{colors.on_surface.light.hex}}"
muted = "{{colors.on_surface_variant.light.hex}}"

accent = "{{colors.primary.light.hex}}"
accentMuted = "{{colors.primary_container.light.hex}}"

lineNumberBg = "{{colors.surface_container_low.light.hex}}"
lineNumberFg = "{{colors.on_surface_variant.light.hex}}"

addedBg = "{{colors.tertiary_container.light.hex}}"              
removedBg = "{{colors.error_container.light.hex}}"               
contextBg = "{{colors.surface_container_low.light.hex}}"         
selectedHunk = "{{colors.surface_container_highest.light.hex}}"  

addedContentBg = "{{colors.tertiary_container.light.hex}}"                 
removedContentBg = "{{colors.error_container.light.hex}}"                  
contextContentBg = "{{colors.surface_container_low.light.hex}}"

addedSignColor = "{{colors.on_tertiary_container.light.hex}}"
removedSignColor = "{{colors.on_error_container.light.hex}}"
badgeAdded = "{{colors.on_tertiary_container.light.hex}}"
badgeRemoved = "{{colors.on_error_container.light.hex}}"
badgeNeutral = "{{colors.on_surface_variant.light.hex}}"

fileNew = "{{colors.tertiary.light.hex}}"
fileDeleted = "{{colors.error.light.hex}}"
fileModified = "{{colors.secondary.light.hex}}"
fileRenamed = "{{colors.primary.light.hex}}"
fileUntracked = "{{colors.on_surface_variant.light.hex}}"

noteBackground = "{{colors.surface_container_high.light.hex}}"
noteBorder = "{{colors.secondary.light.hex}}"
noteTitleBackground = "{{colors.secondary_container.light.hex}}"
noteTitleText = "{{colors.on_secondary_container.light.hex}}"

[custom_theme.syntax]
default = "{{colors.on_surface.light.hex}}"
keyword = "{{colors.secondary.light.hex}}"
string = "{{colors.tertiary.light.hex}}"
comment = "{{colors.on_surface_variant.light.hex}}"
number = "{{colors.primary.light.hex}}"
function = "{{colors.primary.light.hex}}"
property = "{{colors.on_surface.light.hex}}"
type = "{{colors.primary.light.hex}}"
variable = "{{colors.on_surface.light.hex}}"
operator = "{{colors.on_surface_variant.light.hex}}"
punctuation = "{{colors.on_surface_variant.light.hex}}"
<* endif *>
